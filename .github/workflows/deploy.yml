name: Deploy Review Website to GitHub Pages

on:
  push:
    branches: ["main"] # 當 main 分支有 push 時觸發

# 設定 GitHub Token 的權限，允許它部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci
      #檢查三件套
      - name: Run Lint Check
        run: npm run lint

      - name: Run Type Check
        run: npm run typecheck

      - name: Run Unit Tests
        run: npm run test -- --watch=false # 確保 Vitest 只跑單次就結束，不會卡在監聽模式

      - name: Build project
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_ADMIN_ENTRY: ${{ secrets.VITE_ADMIN_ENTRY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build
      - name: Copy index.html to 404.html
        run: cp dist/index.html dist/404.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Vite 打包後的預設資料夾

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
